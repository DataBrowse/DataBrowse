name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mysqli, mbstring, json

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run tests
        run: php vendor/bin/phpunit tests/
        env:
          DATABROWSE_TEST_HOST: 127.0.0.1
          DATABROWSE_TEST_USER: root
          DATABROWSE_TEST_PASS: test
          DATABROWSE_TEST_PORT: 3306

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Build single file
        run: php build.php

      - uses: actions/upload-artifact@v4
        with:
          name: databrowse.php
          path: databrowse.php

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: databrowse.php

      - uses: softprops/action-gh-release@v2
        with:
          files: databrowse.php
